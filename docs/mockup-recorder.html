<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Mockup Recorder — Trading System</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; font-family:system-ui,sans-serif;
    padding:40px;
  }

  .mockup {
    width:1060px;
    background:#fff;
    border-radius:12px;
    box-shadow: 0 25px 80px rgba(0,0,0,.25), 0 2px 6px rgba(0,0,0,.1);
    overflow:hidden;
  }

  /* Browser chrome */
  .chrome {
    background:linear-gradient(180deg, #e8eaed, #dee1e6);
    padding:10px 16px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .dots { display:flex; gap:7px; }
  .dots span { width:12px; height:12px; border-radius:50%; }
  .dots .r { background:#ff5f57; box-shadow:inset 0 1px 1px rgba(0,0,0,.1); }
  .dots .y { background:#febc2e; box-shadow:inset 0 1px 1px rgba(0,0,0,.1); }
  .dots .g { background:#28c840; box-shadow:inset 0 1px 1px rgba(0,0,0,.1); }
  .address-bar {
    flex:1;
    background:#fff;
    border:1px solid #ccc;
    border-radius:6px;
    padding:5px 14px;
    font-size:13px;
    color:#555;
    font-family:'JetBrains Mono',monospace;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.04);
  }
  .address-bar .lock { color:#28c840; margin-right:6px; }

  /* App content via iframe */
  .content iframe {
    width:1060px;
    height:680px;
    border:none;
    display:block;
  }

  /* Help text */
  .help {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.7); color:#fff; padding:8px 20px;
    border-radius:8px; font-size:12px; backdrop-filter:blur(4px);
  }
  .help kbd { background:rgba(255,255,255,.15); padding:2px 6px; border-radius:3px; font-family:monospace; }
</style>
</head>
<body>

<div class="mockup" id="mockup">
  <div class="chrome">
    <div class="dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
    <div class="address-bar"><span class="lock">🔒</span>localhost:8787</div>
  </div>
  <div class="content">
    <iframe id="app-frame" src="/"></iframe>
  </div>
</div>

<div class="help">
  用 ScreenToGif 框選白色 mockup 區域錄製 · 在 iframe 內直接操作 Trading System
</div>

</body>
</html>
