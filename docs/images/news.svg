<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI','Noto Sans TC',system-ui,sans-serif">
  <defs><filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".06"/></filter></defs>
  <rect width="960" height="400" rx="12" fill="#f8f9fa"/>
  <!-- Nav -->
  <rect width="960" height="44" rx="12" fill="#fff"/><rect y="40" width="960" height="4" fill="#fff"/>
  <text x="24" y="28" font-size="14" font-weight="700" fill="#3b82f6" font-family="monospace">📈 Trading System</text>
  <line x1="0" y1="44" x2="960" y2="44" stroke="#e5e7eb"/>
  <rect y="44" width="960" height="36" fill="#fff"/>
  <text x="380" y="68" font-size="13" font-weight="600" fill="#111">財經情報</text>
  <line x1="380" y1="76" x2="448" y2="76" stroke="#111" stroke-width="2"/>
  <line x1="0" y1="80" x2="960" y2="80" stroke="#e5e7eb"/>
  <!-- Section header -->
  <text x="24" y="106" font-size="12" font-weight="600" fill="#111">財經情報</text>
  <text x="88" y="106" font-size="10" fill="#9ca3af">RSS 即時</text>
  <rect x="890" y="90" width="46" height="24" rx="4" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="900" y="106" font-size="10" fill="#6b7280">↻ 更新</text>
  <!-- News items -->
  <g transform="translate(20,120)">
    <!-- Item 1 -->
    <g transform="translate(0,0)">
      <text x="0" y="14" font-size="9" fill="#9ca3af" font-family="monospace">04-15 14:30</text>
      <rect x="80" y="2" width="32" height="16" rx="2" fill="rgba(59,130,246,.1)" stroke="rgba(59,130,246,.2)"/>
      <text x="86" y="14" font-size="9" fill="#3b82f6" font-family="monospace">台股</text>
      <text x="120" y="14" font-size="12" fill="#111">台積電法說會公布 Q2 展望優於市場預期，ADR 盤後漲 3%</text>
      <text x="120" y="30" font-size="10" fill="#9ca3af">鉅亨網</text>
      <line x1="0" y1="40" x2="916" y2="40" stroke="#f3f4f6"/>
    </g>
    <!-- Item 2 -->
    <g transform="translate(0,48)">
      <text x="0" y="14" font-size="9" fill="#9ca3af" font-family="monospace">04-15 13:45</text>
      <rect x="80" y="2" width="32" height="16" rx="2" fill="rgba(245,158,11,.1)" stroke="rgba(245,158,11,.2)"/>
      <text x="86" y="14" font-size="9" fill="#f59e0b" font-family="monospace">國際</text>
      <text x="120" y="14" font-size="12" fill="#111">Fed 維持利率不變，鮑威爾暗示年內降息空間有限</text>
      <text x="120" y="30" font-size="10" fill="#9ca3af">Yahoo 財經</text>
      <line x1="0" y1="40" x2="916" y2="40" stroke="#f3f4f6"/>
    </g>
    <!-- Item 3 -->
    <g transform="translate(0,96)">
      <text x="0" y="14" font-size="9" fill="#9ca3af" font-family="monospace">04-15 12:10</text>
      <rect x="80" y="2" width="32" height="16" rx="2" fill="rgba(59,130,246,.1)" stroke="rgba(59,130,246,.2)"/>
      <text x="86" y="14" font-size="9" fill="#3b82f6" font-family="monospace">台股</text>
      <text x="120" y="14" font-size="12" fill="#111">外資連三日買超台股逾 200 億，聚焦半導體與 AI 伺服器</text>
      <text x="120" y="30" font-size="10" fill="#9ca3af">工商時報</text>
      <line x1="0" y1="40" x2="916" y2="40" stroke="#f3f4f6"/>
    </g>
    <!-- Item 4 -->
    <g transform="translate(0,144)">
      <text x="0" y="14" font-size="9" fill="#9ca3af" font-family="monospace">04-15 11:30</text>
      <rect x="80" y="2" width="32" height="16" rx="2" fill="rgba(168,85,247,.1)" stroke="rgba(168,85,247,.2)"/>
      <text x="86" y="14" font-size="9" fill="#a855f7" font-family="monospace">總經</text>
      <text x="120" y="14" font-size="12" fill="#111">台幣升值至 31.5 元兑 1 美元，出口商避險需求上升</text>
      <text x="120" y="30" font-size="10" fill="#9ca3af">中央社</text>
      <line x1="0" y1="40" x2="916" y2="40" stroke="#f3f4f6"/>
    </g>
    <!-- Item 5 -->
    <g transform="translate(0,192)">
      <text x="0" y="14" font-size="9" fill="#9ca3af" font-family="monospace">04-15 10:20</text>
      <rect x="80" y="2" width="32" height="16" rx="2" fill="rgba(245,158,11,.1)" stroke="rgba(245,158,11,.2)"/>
      <text x="86" y="14" font-size="9" fill="#f59e0b" font-family="monospace">國際</text>
      <text x="120" y="14" font-size="12" fill="#111">NVIDIA 發布新一代 Blackwell Ultra GPU，算力提升 2.5 倍</text>
      <text x="120" y="30" font-size="10" fill="#9ca3af">Yahoo 財經</text>
    </g>
  </g>
</svg>
