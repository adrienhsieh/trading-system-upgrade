    <text x="290" y="216" font-size="8" fill="#9ca3af" font-family="monospace">2024/06</text>
    <text x="500" y="216" font-size="8" fill="#9ca3af" font-family="monospace">2025/01</text>
    <text x="710" y="216" font-size="8" fill="#9ca3af" font-family="monospace">2025/06</text>
    <text x="860" y="216" font-size="8" fill="#9ca3af" font-family="monospace">2025/12</text>
