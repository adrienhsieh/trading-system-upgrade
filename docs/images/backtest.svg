<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI','Noto Sans TC',system-ui,sans-serif">
  <defs><filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".06"/></filter></defs>
  <rect width="960" height="420" rx="12" fill="#f8f9fa"/>
  <!-- Header -->
